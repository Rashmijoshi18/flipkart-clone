<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f1f3f6;
        }

        .header {
            background-color: #2874f0;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .header .search-bar {
            flex: 1;
            margin: 0 20px;
            display: flex;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px 0 0 4px;
        }

        .search-bar button {
            background-color: #ff5722;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }

        .nav {
            display: flex;
            gap: 15px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background-color: #ff5722;
            border-radius: 4px;
        }

        .banner {
            background: url('https://th.bing.com/th/id/OIP.YQQH0QdRdWrqFTIvCr1_dAHaEK?rs=1&pid=ImgDetMain') no-repeat center center;
            /* background-size: cover; */
            height: 500px;
            margin: 20px;
            border-radius: 8px;
            background-size: 1200px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 300px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .product h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .product p {
            color: #555;
            margin-bottom: 10px;
        }

        .product button {
            padding: 10px 15px;
            background-color: #2874f0;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .footer {
            background-color: #2874f0;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 20px;
        }
    </style>
</head>

        <div class="logo">Flipkart</div>
        <div class="search-bar">
            <input type="text" placeholder="Search for products, brands, and more">

        </div>
        <div class="nav">
            <a href="#">Login</a>
            <a href="#">Cart</a>
        </div>
    </div>
